<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人云记账系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* 100% 恢复你原始的精美样式 */
:root { --bg: #f5f7fb; --card: rgba(255,255,255,0.92); --text: #1f2937; --muted: #6b7280; --line: #e5e7eb; --primary: #4f46e5; --primary-soft: #eef2ff; --danger: #ef4444; --danger-soft: #fef2f2; --success: #16a34a; --success-soft: #f0fdf4; --warn: #f59e0b; --shadow: 0 10px 30px rgba(31, 41, 55, 0.08); --radius: 20px; }
* { box-sizing: border-box; }
body { margin:0; padding:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container{max-width:1400px;margin:0 auto;padding:24px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.brand h1{margin:0;font-size:28px;font-weight:800;letter-spacing:0.5px;}
.brand p{margin:6px 0 0;color:var(--muted);font-size:14px;}
.month-switch{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:16px;padding:10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);}
.month-switch button{border:none;background:var(--primary-soft);color:var(--primary);width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:18px;font-weight:700;}
.month-switch span{min-width:120px;text-align:center;font-weight:700;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);}
.summary-card .label{color:var(--muted);font-size:13px;margin-bottom:10px;}
.summary-card .value{font-size:30px;font-weight:800;}
.summary-card.income .value{color:var(--success);}
.summary-card.expense .value{color:var(--danger);}
.summary-card.balance .value{color:var(--text);}
.summary-card.rate .value{color:var(--primary);}
.layout{display:grid;grid-template-columns:280px minmax(0,1fr) 320px;gap:20px;align-items:start;}
.panel{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);overflow:hidden;}
.panel h3{margin:0 0 16px;font-size:18px;}
.subtle{color:var(--muted);font-size:13px;}
.calendar-box{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:14px;}
.weekday,.day{text-align:center;padding:10px 0;border-radius:12px;font-size:13px;}
.weekday{color:var(--muted);font-weight:700;}
.day{background:#fff;border:1px solid var(--line);cursor:pointer;transition:0.2s ease;}
.day:hover{transform:translateY(-1px);}
.day.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 8px 16px rgba(79,70,229,0.25);}
.day.empty{background:transparent;border:none;cursor:default;}
.filter-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.tag{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;}
.tag.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.full{grid-column:1 / -1;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;}
.field input,.field select{width:100%;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:14px;font-size:14px;outline:none;transition:0.2s ease;}
.field input:focus,.field select:focus{border-color:#a5b4fc;box-shadow:0 0 0 4px rgba(79,70,229,0.08);}
.category-buttons{display:flex;flex-wrap:wrap;gap:10px;}
.category-btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:14px;cursor:pointer;font-size:14px;}
.category-btn.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;}
.action-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;}
.btn{border:none;border-radius:14px;padding:12px 18px;cursor:pointer;font-size:14px;font-weight:700;}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 10px 20px rgba(79,70,229,0.22);}
.btn-secondary{background:#fff;border:1px solid var(--line);color:var(--text);}
.toolbar{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;}
.toolbar select,.toolbar input{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:12px;font-size:13px;}
.list{display:flex;flex-direction:column;gap:12px;max-height:520px;overflow:auto;padding-right:4px;}
.record{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;}
.record-left{min-width:0;}
.record-title{display:flex;align-items:center;gap:10px;font-weight:700;margin-bottom:6px;}
.badge{font-size:12px;border-radius:999px;padding:4px 8px;background:var(--primary-soft);color:var(--primary);white-space:nowrap;}
.record-meta{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.record-right{display:flex;align-items:center;gap:10px;}
.amount.income{color:var(--success);font-weight:800;}
.amount.expense{color:var(--danger);font-weight:800;}
.icon-btn{border:1px solid var(--line);background:#fff;border-radius:10px;width:34px;height:34px;cursor:pointer;opacity:0;transition:0.2s ease;}
.record:hover .icon-btn{opacity:1;}
.budget-list{display:flex;flex-direction:column;gap:14px;}
.budget-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;position:relative;}
.budget-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.budget-name{font-weight:700;cursor:pointer;border-radius:10px;padding:4px 8px;margin-left:-8px;}
.budget-name:hover{background:var(--primary-soft);color:var(--primary);}
.budget-input{width:90px;border:1px solid #c7d2fe;border-radius:10px;padding:6px 8px;font-size:13px;}
.budget-meta{font-size:12px;color:var(--muted);margin-bottom:10px;}
.progress{width:100%;height:100%;background:#edf2f7;border-radius:999px;overflow:hidden;}
.progress-bar{height:100%;border-radius:999px;width:0%;transition:width 0.25s ease;background:var(--success);}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px;align-items:stretch;}
.chart-panel{min-height:360px;display:flex;flex-direction:column;}
.chart-wrap{position:relative;height:280px;width:100%;flex:1;min-height:280px;overflow:hidden;}
.chart-wrap canvas{display:block;width:100% !important;height:100% !important;}
.empty-box{text-align:center;color:var(--muted);padding:30px 12px;border:1px dashed var(--line);border-radius:16px;background:rgba(255,255,255,0.65);}
.budget-add{margin-top:10px;color:var(--primary);cursor:pointer;font-weight:700;}
@media(max-width:1200px){.layout{grid-template-columns:1fr;}.summary-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:720px){.container{padding:16px;}.summary-grid,.charts,.form-grid{grid-template-columns:1fr;}.topbar{align-items:flex-start;}.record{grid-template-columns:1fr;}.record-right{justify-content:space-between;}.icon-btn{opacity:1;}}
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand">
      <h1>云端记账系统</h1>
      <p id="syncStatus">正在加载云端数据...</p>
    </div>
    <div class="month-switch">
      <button id="prevMonth">‹</button>
      <span id="currentMonthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card balance"><div class="label">本月结余</div><div class="value" id="balanceValue">¥0.00</div></div>
    <div class="summary-card income"><div class="label">本月收入</div><div class="value" id="incomeValue">¥0.00</div></div>
    <div class="summary-card expense"><div class="label">本月支出</div><div class="value" id="expenseValue">¥0.00</div></div>
    <div class="summary-card rate"><div class="label">预算使用率</div><div class="value" id="budgetRateValue">0%</div></div>
  </div>

  <div class="layout">
    <aside class="panel">
      <h3>日期与筛选</h3>
      <div id="calendar" class="calendar-box"></div>
      <div style="margin-top:10px;"><label><input type="checkbox" id="dayFilterToggle"/> 仅看当天流水</label></div>
      <div class="filter-tags" id="filterTags"></div>
    </aside>

    <main>
      <section class="panel" style="margin-bottom:20px;">
        <h3 id="formTitle">快速记账</h3>
        <div class="form-grid">
          <div class="field"><label>金额</label><input id="amountInput" type="number" step="0.01" placeholder="0.00"/></div>
          <div class="field"><label>类型</label><select id="typeInput"><option value="expense">支出</option><option value="income">收入</option></select></div>
          <div class="field full"><label>分类</label><div class="category-buttons" id="categoryButtons"></div></div>
          <div class="field"><label>日期</label><input id="dateInput" type="date"/></div>
          <div class="field"><label>备注</label><input id="noteInput" type="text" placeholder="描述一下..."/></div>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" id="saveBtn">保存记录并同步</button>
          <button class="btn btn-secondary" id="resetBtn">清空重置</button>
        </div>
      </section>

      <section class="panel">
        <h3>流水记录</h3>
        <div class="toolbar">
          <select id="typeFilter"><option value="all">全部类型</option><option value="expense">仅支出</option><option value="income">仅收入</option></select>
          <select id="sortFilter"><option value="desc">日期倒序</option><option value="asc">日期正序</option></select>
          <input id="searchInput" type="text" placeholder="搜索备注..."/>
        </div>
        <div class="list" id="recordList"></div>
      </section>
    </main>

    <aside class="panel">
      <h3>分类预算</h3>
      <div class="budget-list" id="budgetList"></div>
      <div class="budget-add" id="addCategoryBtn">+ 添加新分类</div>
    </aside>
  </div>

  <div class="charts">
    <section class="panel chart-panel"><h3>分类支出分布</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></section>
    <section class="panel chart-panel"><h3>每日支出趋势</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></section>
  </div>
</div>

<script>
// ==================== 核心配置 ====================
const CLOUD = {
    KEY: '$2a$10$UBAjkWUwdLMQCbr52Rx2BeQ8SousG.3M78OBWeXTzGFxRxIjWNpxS',
    BIN: '69b7b45aaa77b81da9eb53d7'
};
// =================================================

let records = [];
let budgets = {};
let categories = ['餐饮', '交通', '购物', '娱乐', '住房', '医疗', '工资', '红包', '其他'];
let selectedFormCategory = '餐饮';
let selectedCategory = '全部';
let selectedDay = null;
let currentDate = new Date();
let editingId = null;
let showOnlyDay = false;
let pieChart = null, barChart = null;

// --- 元素 ---
const amountInput = document.getElementById('amountInput');
const typeInput = document.getElementById('typeInput');
const dateInput = document.getElementById('dateInput');
const noteInput = document.getElementById('noteInput');
const saveBtn = document.getElementById('saveBtn');
const resetBtn = document.getElementById('resetBtn');
const syncStatus = document.getElementById('syncStatus');

// --- 云端核心逻辑 ---
async function loadData() {
    syncStatus.textContent = "☁️ 同步中...";
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${CLOUD.BIN}/latest`, { headers: { 'X-Master-Key': CLOUD.KEY } });
        const data = await res.json();
        if (data.record) {
            records = data.record.records || [];
            budgets = data.record.budgets || {};
            categories = Object.keys(budgets).length ? Object.keys(budgets) : categories;
            syncStatus.textContent = "✅ 云端数据已同步";
        }
    } catch (e) {
        syncStatus.textContent = "⚠️ 离线模式";
        records = JSON.parse(localStorage.getItem('local_recs') || '[]');
        budgets = JSON.parse(localStorage.getItem('local_buds') || '{}');
    }
    renderAll();
}

async function syncToCloud() {
    syncStatus.textContent = "⏳ 同步中...";
    localStorage.setItem('local_recs', JSON.stringify(records));
    localStorage.setItem('local_buds', JSON.stringify(budgets));
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${CLOUD.BIN}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': CLOUD.KEY },
            body: JSON.stringify({ records, budgets })
        });
        syncStatus.textContent = "✅ 已加密同步";
    } catch (e) { syncStatus.textContent = "❌ 同步失败"; }
}

// --- 渲染逻辑 (100% 原始功能) ---
function renderCategoryButtons(){
  const container = document.getElementById('categoryButtons'); container.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button'); btn.className = 'category-btn' + (selectedFormCategory===cat?' active':'');
    btn.textContent = cat; btn.onclick = () => { selectedFormCategory = cat; renderCategoryButtons(); };
    container.appendChild(btn);
  });
}

function renderFilterTags(){
  const container = document.getElementById('filterTags'); container.innerHTML = '';
  ['全部', ...categories].forEach(tag => {
    const btn = document.createElement('button'); btn.className = 'tag' + (selectedCategory===tag?' active':'');
    btn.textContent = tag; btn.onclick = () => { selectedCategory = tag; renderAll(); };
    container.appendChild(btn);
  });
}

function renderCalendar(){
  const year = currentDate.getFullYear(); const month = currentDate.getMonth();
  document.getElementById('currentMonthLabel').textContent = `${year}年${month+1}月`;
  const firstDay = new Date(year, month, 1).getDay();
  const totalDays = new Date(year, month+1, 0).getDate();
  const cal = document.getElementById('calendar'); cal.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(w => {
    const d = document.createElement('div'); d.className='weekday'; d.textContent=w; cal.appendChild(d);
  });
  for(let i=0; i<firstDay; i++) cal.appendChild(Object.assign(document.createElement('div'), {className:'day empty'}));
  for(let d=1; d<=totalDays; d++){
    const fullDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEl = document.createElement('div'); dayEl.className = 'day' + (selectedDay===fullDate?' active':'');
    dayEl.textContent = d; dayEl.onclick = () => { selectedDay = (selectedDay===fullDate?null:fullDate); renderAll(); };
    cal.appendChild(dayEl);
  }
}

function renderRecords(){
  const container = document.getElementById('recordList');
  const monthStr = currentDate.toISOString().slice(0, 7);
  let list = records.filter(r => r.date.startsWith(monthStr));
  
  const typeF = document.getElementById('typeFilter').value;
  if(typeF!=='all') list = list.filter(r => r.type === typeF);
  if(selectedCategory!=='全部') list = list.filter(r => r.category === selectedCategory);
  if(showOnlyDay && selectedDay) list = list.filter(r => r.date === selectedDay);
  const searchKW = document.getElementById('searchInput').value.toLowerCase();
  if(searchKW) list = list.filter(r => (r.note||'').toLowerCase().includes(searchKW));
  
  const sortF = document.getElementById('sortFilter').value;
  list.sort((a,b) => sortF==='desc'? new Date(b.date)-new Date(a.date) : new Date(a.date)-new Date(b.date));
  
  container.innerHTML = list.length ? '' : '<div class="empty-box">暂无账目</div>';
  list.forEach(r => {
    const el = document.createElement('div'); el.className = 'record';
    el.innerHTML = `
      <div class="record-left" onclick="editRecord(${r.id})">
        <div class="record-title"><span class="badge">${r.category}</span> ${r.note || '无备注'}</div>
        <div class="record-meta">${r.date}</div>
      </div>
      <div class="record-right">
        <div class="amount ${r.type}">${r.type==='income'?'+':'-'}¥${r.amount.toFixed(2)}</div>
        <button class="icon-btn" onclick="deleteRecord(${r.id})">🗑</button>
      </div>`;
    container.appendChild(el);
  });
}

function renderSummary(){
  const monthStr = currentDate.toISOString().slice(0, 7);
  const monthRecs = records.filter(r => r.date.startsWith(monthStr));
  const inc = monthRecs.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp = monthRecs.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
  document.getElementById('incomeValue').textContent = '¥'+inc.toFixed(2);
  document.getElementById('expenseValue').textContent = '¥'+exp.toFixed(2);
  document.getElementById('balanceValue').textContent = '¥'+(inc-exp).toFixed(2);
  const totalBudget = categories.reduce((s,c)=>s+(budgets[c]||0),0);
  document.getElementById('budgetRateValue').textContent = totalBudget? Math.round(exp/totalBudget*100)+'%' : '0%';
}

function renderBudgets(){
  const container = document.getElementById('budgetList'); container.innerHTML = '';
  categories.forEach(cat => {
    if(!(cat in budgets)) budgets[cat] = 0;
    const spent = records.filter(r => r.category===cat && r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const limit = budgets[cat];
    const item = document.createElement('div'); item.className = 'budget-item';
    item.innerHTML = `
      <div class="budget-head"><span class="budget-name">${cat}</span><input class="budget-input" type="number" value="${limit}" onchange="updateBudget('${cat}', this.value)"></div>
      <div class="budget-meta">已用 ¥${spent.toFixed(2)} / 限额 ¥${limit}</div>
      <div class="progress"><div class="progress-bar" style="width:${limit?Math.min(spent/limit*100, 100):0}%"></div></div>`;
    container.appendChild(item);
  });
}

function renderCharts(){
  const monthStr = currentDate.toISOString().slice(0, 7);
  const monthExp = records.filter(r => r.date.startsWith(monthStr) && r.type==='expense');
  const pieData = categories.map(c => monthExp.filter(r=>r.category===c).reduce((s,r)=>s+r.amount,0));
  if(pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pieChart'), { type:'pie', data:{ labels:categories, datasets:[{data:pieData, backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#64748b']}]}});
  const days = new Array(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate()).fill(0).map((_,i)=>i+1);
  const barData = days.map(d => monthExp.filter(r => new Date(r.date).getDate() === d).reduce((s,r)=>s+r.amount,0));
  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), { type:'bar', data:{ labels:days, datasets:[{label:'每日支出', data:barData, backgroundColor:'#4f46e5'}]}});
}

function renderAll(){ renderCategoryButtons(); renderFilterTags(); renderCalendar(); renderRecords(); renderSummary(); renderBudgets(); renderCharts(); }

// --- 交互功能 ---
saveBtn.onclick = () => {
  const amt = parseFloat(amountInput.value); if(!amt) return alert('请输入金额');
  const data = { id: editingId || Date.now(), amount: amt, type: typeInput.value, date: dateInput.value || new Date().toISOString().slice(0,10), note: noteInput.value.trim(), category: selectedFormCategory };
  if(editingId){ const idx=records.findIndex(r=>r.id===editingId); records[idx]=data; editingId=null; document.getElementById('formTitle').textContent='快速记账'; }
  else records.push(data);
  syncToCloud(); resetForm(); renderAll();
};

function editRecord(id){
  const r = records.find(x => x.id === id); if(!r) return;
  editingId = id; amountInput.value = r.amount; typeInput.value = r.type; dateInput.value = r.date; noteInput.value = r.note; selectedFormCategory = r.category;
  document.getElementById('formTitle').textContent = '编辑账目'; renderCategoryButtons(); window.scrollTo(0,0);
}

function deleteRecord(id){ if(confirm('确定删除吗？')){ records = records.filter(r => r.id !== id); syncToCloud(); renderAll(); } }
function updateBudget(cat, val){ budgets[cat] = parseFloat(val) || 0; syncToCloud(); renderAll(); }
function resetForm(){ amountInput.value = ''; noteInput.value = ''; editingId = null; document.getElementById('formTitle').textContent='快速记账'; }

resetBtn.onclick = resetForm;
document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderAll(); };
document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderAll(); };
document.getElementById('typeFilter').onchange = renderAll;
document.getElementById('sortFilter').onchange = renderAll;
document.getElementById('searchInput').oninput = renderAll;
document.getElementById('dayFilterToggle').onchange = (e) => { showOnlyDay = e.target.checked; renderAll(); };
document.getElementById('addCategoryBtn').onclick = () => { const n = prompt('新分类名称'); if(n && !categories.includes(n)){ categories.push(n); budgets[n]=0; syncToCloud(); renderAll(); } };

dateInput.value = new Date().toISOString().slice(0,10);
loadData();
</script>
</body>
</html>
