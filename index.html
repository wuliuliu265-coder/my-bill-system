<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端账本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f5f7fb; --card: rgba(255,255,255,0.92); --text: #1f2937; --muted: #6b7280; --line: #e5e7eb; --primary: #4f46e5; --primary-soft: #eef2ff; --danger: #ef4444; --danger-soft: #fef2f2; --success: #16a34a; --success-soft: #f0fdf4; --radius: 20px; --shadow: 0 10px 30px rgba(31, 41, 55, 0.08); }
        * { box-sizing: border-box; }
        body { margin:0; padding:0; font-family: sans-serif; background:var(--bg); color:var(--text); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .status-bar { font-size: 13px; padding: 8px 15px; border-radius: 10px; background: white; border: 1px solid var(--line); }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--line); box-shadow: var(--shadow); }
        .val { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
        input, select, button { padding: 10px; border-radius: 10px; border: 1px solid var(--line); outline: none; }
        .btn-p { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .record-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--line); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day { padding: 8px; border-radius: 8px; cursor: pointer; background: #fff; font-size: 12px; border: 1px solid var(--line); }
        .day.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0">云端账本</h1>
            <div id="syncStatus" class="status-bar">⏳ 正在初始化...</div>
        </div>
        <div class="card" style="padding:10px">
            <button onclick="changeMonth(-1)">上月</button>
            <span id="monthLabel" style="font-weight:bold; margin:0 10px"></span>
            <button onclick="changeMonth(1)">下月</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="card">收 <div class="val" id="inVal" style="color:var(--success)">¥0</div></div>
        <div class="card">支 <div class="val" id="outVal" style="color:var(--danger)">¥0</div></div>
        <div class="card">剩 <div class="val" id="balVal">¥0</div></div>
    </div>

    <div class="layout">
        <div class="main-content">
            <div class="card" style="margin-bottom:20px">
                <h3>快速记账</h3>
                <div style="display:flex; gap:10px; flex-wrap:wrap">
                    <input id="amt" type="number" placeholder="金额">
                    <select id="type"><option value="expense">支出</option><option value="income">收入</option></select>
                    <select id="cat"></select>
                    <input id="note" type="text" placeholder="备注">
                    <button class="btn-p" onclick="addRecord()">保存并同步</button>
                </div>
            </div>
            <div id="list" class="list-container"></div>
        </div>
        
        <aside>
            <div class="card" style="margin-bottom:20px">
                <h3>日历筛选</h3>
                <div id="calendar" class="calendar-grid"></div>
            </div>
            <div class="card">
                <h3>分类支出</h3>
                <canvas id="chart" height="250"></canvas>
            </div>
        </aside>
    </div>
</div>

<script>
// ==================== 配置区 ====================
const CONFIG = {
    API_KEY: '$2a$10$UBAjkWUwdLMQCbr52Rx2BeQ8SousG.3M78OBWeXTzGFxRxIjWNpxS', 
    BIN_ID: '' // 第一次运行后，把弹窗里的ID填在这里
};
// ===============================================

let records = [];
let budgets = {};
let categories = ['餐饮','交通','购物','娱乐','住房','医疗','工资','红包','其他'];
let currentDate = new Date();
let selectedDay = null;
let myChart = null;

const syncStatus = document.getElementById('syncStatus');

// --- 自动初始化云空间 ---
async function autoInit() {
    // 如果没有 ID，尝试自动创建一个
    if (!CONFIG.BIN_ID) {
        syncStatus.textContent = "🚀 正在检测云空间...";
        try {
            const res = await fetch('https://api.jsonbin.io/v3/b', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.API_KEY },
                body: JSON.stringify({ records: [], budgets: {} })
            });
            const data = await res.json();
            if (data.metadata) {
                const newId = data.metadata.id;
                syncStatus.innerHTML = `✅ 创建成功！请复制 ID 并填入代码：<b>${newId}</b>`;
                alert("云端仓库已创建！\n请务必复制以下 ID 并填入代码 CONFIG.BIN_ID 中：\n\n" + newId);
                CONFIG.BIN_ID = newId;
            }
        } catch (e) {
            syncStatus.textContent = "❌ 请检查 API_KEY 是否正确";
            return;
        }
    }

    // 拉取数据
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
            headers: { 'X-Master-Key': CONFIG.API_KEY }
        });
        const data = await res.json();
        records = data.record.records || [];
        syncStatus.textContent = "☁️ 云端同步成功";
        renderAll();
    } catch (e) {
        syncStatus.textContent = "⚠️ 离线模式";
        records = JSON.parse(localStorage.getItem('bak_records') || '[]');
        renderAll();
    }
}

async function upload() {
    syncStatus.textContent = "⏳ 同步中...";
    localStorage.setItem('bak_records', JSON.stringify(records));
    try {
        await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.API_KEY },
            body: JSON.stringify({ records })
        });
        syncStatus.textContent = "✅ 已同步至云端";
    } catch (e) {
        syncStatus.textContent = "❌ 同步失败";
    }
}

// --- 业务逻辑 ---
function renderAll() {
    const month = currentDate.toISOString().slice(0, 7);
    document.getElementById('monthLabel').textContent = month;
    
    // 过滤数据
    let filtered = records.filter(r => r.date.startsWith(month));
    if (selectedDay) filtered = filtered.filter(r => r.date === selectedDay);
    
    // 算账
    const inc = filtered.filter(r => r.type === 'income').reduce((a, b) => a + b.amount, 0);
    const exp = filtered.filter(r => r.type === 'expense').reduce((a, b) => a + b.amount, 0);
    document.getElementById('inVal').textContent = '¥' + inc;
    document.getElementById('outVal').textContent = '¥' + exp;
    document.getElementById('balVal').textContent = '¥' + (inc - exp);

    // 列表
    const listEl = document.getElementById('list');
    listEl.innerHTML = filtered.length ? '' : '<div class="card">本月暂无数据</div>';
    filtered.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(r => {
        const item = document.createElement('div');
        item.className = 'record-item';
        item.innerHTML = `<div><b>${r.category}</b> <small>${r.date}</small><br>${r.note}</div>
                          <div style="color:${r.type==='income'?'green':'red'}">${r.type==='income'?'+':'-'}${r.amount}</div>`;
        listEl.appendChild(item);
    });

    renderCalendar();
    renderChart(filtered);
}

function renderCalendar() {
    const calEl = document.getElementById('calendar');
    calEl.innerHTML = '';
    const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
    for(let i=1; i<=daysInMonth; i++) {
        const dStr = `${currentDate.toISOString().slice(0,8)}${String(i).padStart(2,'0')}`;
        const div = document.createElement('div');
        div.className = `day ${selectedDay === dStr ? 'active' : ''}`;
        div.textContent = i;
        div.onclick = () => { selectedDay = (selectedDay === dStr ? null : dStr); renderAll(); };
        calEl.appendChild(div);
    }
}

function renderChart(data) {
    const ctx = document.getElementById('chart').getContext('2d');
    const chartData = {};
    data.filter(r => r.type === 'expense').forEach(r => {
        chartData[r.category] = (chartData[r.category] || 0) + r.amount;
    });
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: Object.keys(chartData),
            datasets: [{ data: Object.values(chartData), backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'] }]
        },
        options: { plugins: { legend: { position: 'bottom' } } }
    });
}

function addRecord() {
    const a = parseFloat(document.getElementById('amt').value);
    const n = document.getElementById('note').value || '无备注';
    if(!a) return alert('请输入金额');
    records.push({
        id: Date.now(),
        amount: a,
        type: document.getElementById('type').value,
        category: document.getElementById('cat').value,
        note: n,
        date: new Date().toISOString().slice(0, 10)
    });
    document.getElementById('amt').value = '';
    document.getElementById('note').value = '';
    renderAll();
    upload();
}

function changeMonth(n) {
    currentDate.setMonth(currentDate.getMonth() + n);
    selectedDay = null;
    renderAll();
}

// 初始化下拉框
const catSel = document.getElementById('cat');
categories.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });

// 启动
autoInit();
</script>
</body>
</html>
