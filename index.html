<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>云端记账系统 - 移动优化版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --line: #e2e8f0;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --danger: #ef4444;
  --danger-soft: #fef2f2;
  --success: #10b981;
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --radius: 16px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; padding:0; font-family:-apple-system, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

/* 顶部状态 */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.status-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #dcfce7; color: #166534; }
.month-nav { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 6px; border-radius: 12px; box-shadow: var(--shadow); }
.month-nav button { border: none; background: var(--primary-soft); color: var(--primary); width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; }

/* 数据卡片 */
.summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--card); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--line); }
.summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.summary-card .value { font-size: 20px; font-weight: 800; }

/* 响应式布局：手机端改为单列，记账面板优先 */
.main-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 1024px) {
    .main-layout { grid-template-columns: 280px 1fr 320px; }
    .order-first { order: -1; }
}

.panel { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--line); }
.panel h3 { margin: 0 0 16px 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; }

/* 记账表单 */
.form-grid { display: grid; gap: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; outline: none; }
.cat-group { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--line); background: #fff; font-size: 13px; cursor: pointer; }
.cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* 预算管理 - 增加删除功能 */
.budget-item { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f1f5f9; }
.budget-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.budget-name { font-weight: 600; flex: 1; }
.budget-input { width: 80px; text-align: right; border: none; font-weight: bold; color: var(--primary); }
.del-cat { color: var(--danger); font-size: 18px; padding: 0 8px; cursor: pointer; border: none; background: none; }
.progress { height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--primary); transition: width 0.3s; }

/* 流水列表 */
.record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
.rec-info { min-width: 0; }
.rec-tag { font-size: 10px; padding: 2px 6px; background: var(--primary-soft); color: var(--primary); border-radius: 4px; margin-right: 6px; }
.rec-note { font-weight: 500; font-size: 14px; }
.rec-date { font-size: 11px; color: var(--muted); }
.rec-amt { font-weight: 700; font-size: 15px; }
.rec-amt.expense { color: var(--danger); }
.rec-amt.income { color: var(--success); }

.btn-full { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn-primary { background: var(--primary); color: #fff; }
.add-cat-btn { text-align: center; color: var(--primary); font-size: 14px; font-weight: 600; margin-top: 10px; cursor: pointer; border: 2px dashed var(--primary-soft); padding: 10px; border-radius: 12px; }
</style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <div>
            <h2 style="margin:0; font-size: 20px;">云端账本</h2>
            <div id="syncStatus" class="status-badge">☁️ 同步中...</div>
        </div>
        <div class="month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="monthLabel" style="font-weight:700; font-size:14px;">2026年03月</span>
            <button onclick="changeMonth(1)">›</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="summary-card"><div class="label">结余</div><div id="sum-balance" class="value">¥0</div></div>
        <div class="summary-card"><div class="label">支出</div><div id="sum-expense" class="value" style="color:var(--danger)">¥0</div></div>
    </div>

    <div class="main-layout">
        <section class="panel">
            <h3>快速记账 <span id="editMode" style="display:none; color:var(--warn); font-size:12px;">(编辑中)</span></h3>
            <div class="form-grid">
                <div class="field">
                    <input id="amt" type="number" placeholder="输入金额 (0.00)" step="0.01">
                </div>
                <div class="field">
                    <div class="cat-group" id="cat-btns"></div>
                </div>
                <div class="field">
                    <input id="note" type="text" placeholder="备注：去哪儿消费了？">
                </div>
                <div style="display: flex; gap: 10px;">
                    <select id="type" style="flex:1"><option value="expense">支出</option><option value="income">收入</option></select>
                    <input id="date" type="date" style="flex:2">
                </div>
                <button class="btn-full btn-primary" onclick="handleSave()">保存并同步</button>
                <button id="cancelBtn" style="display:none; background:none; border:none; color:var(--muted); font-size:13px;" onclick="resetForm()">取消编辑</button>
            </div>
        </section>

        <section class="panel">
            <h3>分类预算</h3>
            <div id="budget-list"></div>
            <div class="add-cat-btn" onclick="addCategory()">+ 新增分类</div>
        </section>

        <section class="panel">
            <h3>最近记录</h3>
            <div id="record-list"></div>
        </section>
    </div>
</div>

<script>
// ==================== 核心云端配置 ====================
const CLOUD = {
    KEY: '$2a$10$UBAjkWUwdLMQCbr52Rx2BeQ8SousG.3M78OBWeXTzGFxRxIjWNpxS',
    BIN: '69b7b45aaa77b81da9eb53d7'
};
// ====================================================


let state = {
    records: [],
    budgets: {},
    categories: ['餐饮', '交通', '购物', '娱乐', '住房', '工资'],
    currentDate: new Date(),
    editingId: null,
    selectedCat: '餐饮'
};

// --- 云同步 ---
async function sync(upload = false) {
    const el = document.getElementById('syncStatus');
    el.textContent = upload ? "⏳ 同步中..." : "☁️ 载入中...";
    try {
        const headers = { 'X-Master-Key': CONFIG.KEY, 'Content-Type': 'application/json' };
        const url = `https://api.jsonbin.io/v3/b/${CONFIG.BIN}`;
        
        if (upload) {
            await fetch(url, { method: 'PUT', headers, body: JSON.stringify(state) });
            el.textContent = "✅ 已同步";
        } else {
            const res = await fetch(url + '/latest', { headers });
            const data = await res.json();
            if (data.record) {
                state.records = data.record.records || [];
                state.budgets = data.record.budgets || {};
                state.categories = data.record.categories || state.categories;
                el.textContent = "✅ 连接成功";
            }
        }
    } catch (e) { el.textContent = "⚠️ 离线模式"; }
    render();
}

// --- 渲染逻辑 ---
function render() {
    const monthStr = state.currentDate.toISOString().slice(0, 7);
    document.getElementById('monthLabel').textContent = state.currentDate.getFullYear() + '年' + (state.currentDate.getMonth() + 1) + '月';

    // 1. 记账分类按钮
    const btnBox = document.getElementById('cat-btns');
    btnBox.innerHTML = state.categories.map(c => `
        <button class="cat-btn ${state.selectedCat === c ? 'active' : ''}" onclick="state.selectedCat='${c}';render()">${c}</button>
    `).join('');

    // 2. 预算列表 (增加删除功能)
    const budgetBox = document.getElementById('budget-list');
    budgetBox.innerHTML = state.categories.map(c => {
        const spent = state.records.filter(r => r.category === c && r.type === 'expense' && r.date.startsWith(monthStr)).reduce((s, r) => s + r.amt, 0);
        const limit = state.budgets[c] || 0;
        const percent = limit > 0 ? Math.min((spent / limit) * 100, 100) : 0;
        return `
            <div class="budget-item">
                <div class="budget-row">
                    <button class="del-cat" onclick="deleteCategory('${c}')">×</button>
                    <span class="budget-name">${c}</span>
                    <input class="budget-input" type="number" value="${limit}" onchange="updateBudget('${c}', this.value)">
                </div>
                <div style="font-size:11px; color:var(--muted); margin-bottom:4px;">已用: ¥${spent.toFixed(1)} / 预算: ¥${limit}</div>
                <div class="progress"><div class="progress-bar" style="width:${percent}%"></div></div>
            </div>
        `;
    }).join('');

    // 3. 流水列表
    const recBox = document.getElementById('record-list');
    const filtered = state.records.filter(r => r.date.startsWith(monthStr)).sort((a,b) => b.id - a.id);
    recBox.innerHTML = filtered.length ? filtered.map(r => `
        <div class="record-item" onclick="editRecord(${r.id})">
            <div class="rec-info">
                <div><span class="rec-tag">${r.category}</span><span class="rec-note">${r.note || '无备注'}</span></div>
                <div class="rec-date">${r.date}</div>
            </div>
            <div class="rec-amt ${r.type}"> ${r.type === 'income' ? '+' : '-'}¥${r.amt.toFixed(2)} </div>
        </div>
    `).join('') : '<div style="text-align:center;color:var(--muted);padding:20px;">本月暂无数据</div>';

    // 4. 汇总
    const inc = filtered.filter(r => r.type === 'income').reduce((s,r) => s+r.amt, 0);
    const exp = filtered.filter(r => r.type === 'expense').reduce((s,r) => s+r.amt, 0);
    document.getElementById('sum-balance').textContent = '¥' + (inc - exp).toFixed(2);
    document.getElementById('sum-expense').textContent = '¥' + exp.toFixed(2);
}

// --- 操作逻辑 ---
function handleSave() {
    const amt = parseFloat(document.getElementById('amt').value);
    if (!amt) return alert("请输入有效金额");
    
    const record = {
        id: state.editingId || Date.now(),
        amt: amt,
        note: document.getElementById('note').value,
        type: document.getElementById('type').value,
        category: state.selectedCat,
        date: document.getElementById('date').value || new Date().toISOString().slice(0,10)
    };

    if (state.editingId) {
        state.records = state.records.map(r => r.id === state.editingId ? record : r);
    } else {
        state.records.push(record);
    }
    resetForm();
    sync(true);
}

function addCategory() {
    const name = prompt("输入新分类名称：");
    if (name && !state.categories.includes(name)) {
        state.categories.push(name);
        state.budgets[name] = 0;
        sync(true);
    }
}

function deleteCategory(cat) {
    if (confirm(`彻底删除“${cat}”分类及预算吗？`)) {
        state.categories = state.categories.filter(c => c !== cat);
        delete state.budgets[cat];
        sync(true);
    }
}

function updateBudget(cat, val) {
    state.budgets[cat] = parseFloat(val) || 0;
    sync(true);
}

function editRecord(id) {
    const r = state.records.find(x => x.id === id);
    if (!r) return;
    state.editingId = id;
    state.selectedCat = r.category;
    document.getElementById('amt').value = r.amt;
    document.getElementById('note').value = r.note;
    document.getElementById('type').value = r.type;
    document.getElementById('date').value = r.date;
    document.getElementById('editMode').style.display = 'inline';
    document.getElementById('cancelBtn').style.display = 'block';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
    state.editingId = null;
    document.getElementById('amt').value = '';
    document.getElementById('note').value = '';
    document.getElementById('editMode').style.display = 'none';
    document.getElementById('cancelBtn').style.display = 'none';
    render();
}

function changeMonth(step) {
    state.currentDate.setMonth(state.currentDate.getMonth() + step);
    render();
}

document.getElementById('date').value = new Date().toISOString().slice(0,10);
sync();
</script>
</body>
</html>
