<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人云记账系统 - 增强版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f5f7fb;
  --card: rgba(255,255,255,0.92);
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --danger: #ef4444;
  --success: #16a34a;
  --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
  --radius: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; padding:0; font-family:"Segoe UI","PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:16px; }

/* 顶部配置 */
.topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.config-area { display: flex; gap: 10px; align-items: center; font-size: 12px; }
.text-btn { color: var(--primary); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }

.month-switch { background:var(--card); border-radius:12px; padding:6px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow); }
.month-switch button { border:none; background:var(--primary-soft); color:var(--primary); width:32px; height:32px; border-radius:8px; cursor:pointer; font-weight:700; }
.month-switch span { min-width:80px; text-align:center; font-size:14px; font-weight:700; }

/* 汇总卡片 */
.summary-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-bottom:16px; }
@media (min-width: 1024px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
.summary-card { background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,0.5); }
.summary-card .label { color:var(--muted); font-size:12px; margin-bottom:4px; }
.summary-card .value { font-size:20px; font-weight:800; }

/* 布局 */
.layout { display: flex; flex-direction: column; gap: 16px; }
@media (min-width: 1024px) { .layout { display:grid; grid-template-columns: 280px minmax(0,1fr) 320px; } }

.panel { background:var(--card); border:1px solid rgba(255,255,255,0.7); box-shadow:var(--shadow); border-radius:var(--radius); padding:16px; }
.panel h3 { margin:0 0 12px; font-size:16px; display: flex; justify-content: space-between; align-items: center; }

/* 日历 */
.calendar-box { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
.day { padding:8px 0; font-size:12px; border-radius:8px; text-align:center; cursor:pointer; border:1px solid var(--line); }
.day.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* 表单 */
.form-grid { display:grid; grid-template-columns: 1fr; gap:12px; }
.category-buttons { display:flex; flex-wrap:wrap; gap:6px; }
.category-btn { padding:8px 12px; border-radius:10px; font-size:13px; border:1px solid var(--line); background:#fff; }
.category-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.field input, .field select { padding:10px; border-radius:10px; border:1px solid var(--line); font-size:14px; width:100%; outline: none; }

/* 预算列表删除按钮 */
.del-cat { color: var(--danger); margin-right: 8px; cursor: pointer; font-weight: bold; font-size: 16px; border: none; background: none; }

.record { padding:12px; border: 1px solid var(--line); border-radius:12px; margin-bottom:10px; background:#fff; display: flex; justify-content: space-between; align-items: center; }
.charts { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
@media (min-width: 768px) { .charts { display:grid; grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="container" id="appBody" style="display:none;">
    <div class="topbar">
        <div>
            <h2 style="margin:0; font-size:20px;">云端账本</h2>
            <div class="config-area">
                <span id="syncStatus">☁️ 初始化...</span>
                <span class="text-btn" onclick="reconfig()">修改配置</span>
            </div>
        </div>
        <div class="month-switch">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="currentMonthLabel"></span>
            <button onclick="changeMonth(1)">›</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="summary-card"><div class="label">本月结余</div><div class="value" id="balanceValue">¥0.00</div></div>
        <div class="summary-card"><div class="label">总收入</div><div class="value" id="incomeValue" style="color:var(--success)">¥0.00</div></div>
        <div class="summary-card"><div class="label">总支出</div><div class="value" id="expenseValue" style="color:var(--danger)">¥0.00</div></div>
        <div class="summary-card"><div class="label">预算进度</div><div class="value" id="budgetRateValue">0%</div></div>
    </div>

    <div class="layout">
        <aside class="panel">
            <h3>日期筛选</h3>
            <div id="calendar" class="calendar-box"></div>
            <div style="margin-top:10px; font-size:13px;"><label><input type="checkbox" id="dayFilterToggle"/> 仅看选中日期</label></div>
        </aside>

        <main>
            <section class="panel" style="margin-bottom:16px;">
                <h3 id="formTitle">快速记账</h3>
                <div class="form-grid">
                    <input id="amountInput" type="number" step="0.01" placeholder="输入金额 ¥0.00"/>
                    <div class="category-buttons" id="categoryButtons"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <select id="typeInput"><option value="expense">支出</option><option value="income">收入</option></select>
                        <input id="dateInput" type="date"/>
                    </div>
                    <input id="noteInput" type="text" placeholder="备注（可选）"/>
                    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                        <button class="category-btn active" id="saveBtn" style="background:var(--primary); color:#fff;">保存并同步</button>
                        <button class="category-btn" onclick="resetForm()">重置</button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h3>历史流水 <button class="text-btn" onclick="exportToCSV()" style="font-size:12px;">导出CSV</button></h3>
                <div id="recordList"></div>
            </section>
        </main>

        <aside class="panel">
            <h3>分类预算</h3>
            <div id="budgetList"></div>
            <button class="category-btn" style="width:100%; margin-top:10px; border:2px dashed var(--primary);" onclick="addCategory()">+ 新增分类</button>
        </aside>
    </div>
</div>

<script>
// 云端配置
let CLOUD = { KEY: localStorage.getItem('MY_BILL_KEY'), BIN: localStorage.getItem('MY_BILL_BIN') };

// 数据状态
let records = [], budgets = {}, categories = ['餐饮', '交通', '购物', '娱乐', '住房', '工资'];
let selectedFormCategory = '餐饮', selectedDay = null, currentDate = new Date(), editingId = null;

// 初始化检查
function checkConfig() {
    if (!CLOUD.KEY || !CLOUD.BIN) {
        const key = prompt("请输入您的 JSONBin X-Master-Key:");
        const bin = prompt("请输入您的 Bin ID:");
        if (key && bin) {
            localStorage.setItem('MY_BILL_KEY', key);
            localStorage.setItem('MY_BILL_BIN', bin);
            location.reload();
        }
    } else {
        document.getElementById('appBody').style.display = 'block';
        sync();
    }
}

async function sync(isUpload = false) {
    const status = document.getElementById('syncStatus');
    status.textContent = isUpload ? "⏳ 同步中..." : "☁️ 连接中...";
    try {
        const url = `https://api.jsonbin.io/v3/b/${CLOUD.BIN}`;
        const headers = { 'X-Master-Key': CLOUD.KEY, 'Content-Type': 'application/json' };
        if (isUpload) {
            await fetch(url, { method: 'PUT', headers, body: JSON.stringify({ records, budgets, categories }) });
            status.textContent = "✅ 已同步";
        } else {
            const res = await fetch(url + '/latest', { headers });
            const d = await res.json();
            if (d.record) {
                records = d.record.records || [];
                budgets = d.record.budgets || {};
                categories = d.record.categories || categories;
                status.textContent = "✅ 已连接";
            }
        }
    } catch (e) { status.textContent = "⚠️ 连接失败"; }
    renderAll();
}

// 核心渲染
function renderAll() {
    const monthStr = currentDate.toISOString().slice(0, 7);
    document.getElementById('currentMonthLabel').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;
    
    // 汇总
    const m = records.filter(r => r.date.startsWith(monthStr));
    const inc = m.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp = m.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
    document.getElementById('incomeValue').textContent = '¥'+inc.toFixed(1);
    document.getElementById('expenseValue').textContent = '¥'+exp.toFixed(1);
    document.getElementById('balanceValue').textContent = '¥'+(inc-exp).toFixed(1);

    // 分类按钮
    const btnBox = document.getElementById('categoryButtons');
    btnBox.innerHTML = categories.map(c => `<button class="category-btn ${selectedFormCategory===c?'active':''}" onclick="selectedFormCategory='${c}';renderAll()">${c}</button>`).join('');

    // 预算列表 (含删除功能)
    const budgetBox = document.getElementById('budgetList');
    budgetBox.innerHTML = categories.map(c => {
        const spent = m.filter(r => r.category === c && r.type === 'expense').reduce((s,r)=>s+r.amount,0);
        const limit = budgets[c] || 0;
        return `
            <div style="margin-bottom:12px; padding:10px; border:1px solid var(--line); border-radius:12px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <span><button class="del-cat" onclick="deleteCategory('${c}')">×</button><b>${c}</b></span>
                    <input style="width:60px; text-align:right; border:none; font-weight:bold; color:var(--primary);" type="number" value="${limit}" onchange="updateBudget('${c}', this.value)">
                </div>
                <div style="font-size:11px; color:var(--muted);">已用 ¥${spent.toFixed(1)} / 预算 ¥${limit}</div>
            </div>`;
    }).join('');

    // 历史流水
    const list = document.getElementById('recordList');
    let filtered = m.sort((a,b) => new Date(b.date)-new Date(a.date));
    if (document.getElementById('dayFilterToggle').checked && selectedDay) filtered = filtered.filter(r => r.date === selectedDay);
    list.innerHTML = filtered.map(r => `
        <div class="record" onclick="editRecord(${r.id})">
            <div><small>${r.category}</small> <b>${r.note || '无备注'}</b><br><small style="color:gray">${r.date}</small></div>
            <div style="color:${r.type==='income'?'var(--success)':'var(--danger)'}; font-weight:bold;">${r.type==='income'?'+':'-'}¥${r.amount}</div>
        </div>`).join('');

    renderCalendar();
}

// 增删功能
function addCategory() {
    const name = prompt("输入新分类名称：");
    if (name && !categories.includes(name)) {
        categories.push(name);
        budgets[name] = 0;
        sync(true);
    }
}

function deleteCategory(cat) {
    if (confirm(`确定删除“${cat}”分类及其所有预算配置吗？`)) {
        categories = categories.filter(c => c !== cat);
        delete budgets[cat];
        sync(true);
    }
}

function updateBudget(cat, val) {
    budgets[cat] = parseFloat(val) || 0;
    sync(true);
}

// 基础功能
document.getElementById('saveBtn').onclick = () => {
    const a = parseFloat(document.getElementById('amountInput').value);
    if(!a) return alert('请输入金额');
    const nr = { id: editingId||Date.now(), amount:a, type:document.getElementById('typeInput').value, category:selectedFormCategory, date:document.getElementById('dateInput').value||new Date().toISOString().slice(0,10), note:document.getElementById('noteInput').value };
    if(editingId) { records = records.map(r => r.id === editingId ? nr : r); editingId = null; }
    else records.push(nr);
    document.getElementById('amountInput').value = ''; document.getElementById('noteInput').value = '';
    sync(true);
};

function editRecord(id) {
    const r = records.find(x => x.id === id);
    if (!r) return;
    editingId = id;
    document.getElementById('amountInput').value = r.amount;
    document.getElementById('noteInput').value = r.note;
    document.getElementById('typeInput').value = r.type;
    document.getElementById('dateInput').value = r.date;
    selectedFormCategory = r.category;
    document.getElementById('formTitle').textContent = "修改记录";
    renderAll();
    window.scrollTo(0,0);
}

function resetForm() { editingId = null; document.getElementById('formTitle').textContent = "快速记账"; renderAll(); }
function changeMonth(step) { currentDate.setMonth(currentDate.getMonth() + step); renderAll(); }
function reconfig() { localStorage.clear(); location.reload(); }
function exportToCSV() {
    let csv = "\uFEFF日期,分类,类型,金额,备注\n";
    records.forEach(r => csv += `${r.date},${r.category},${r.type},${r.amount},${r.note||''}\n`);
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    link.download = `账本导出_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
}

function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
    const c = document.getElementById('calendar'); c.innerHTML = '';
    for(let i=0; i<first; i++) c.innerHTML += `<div></div>`;
    for(let d=1; d<=last; d++){
        const f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const e = document.createElement('div'); e.className = 'day' + (selectedDay===f?' active':'');
        e.textContent = d; e.onclick = () => { selectedDay = (selectedDay===f?null:f); renderAll(); };
        c.appendChild(e);
    }
}

document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
document.getElementById('dayFilterToggle').onchange = () => renderAll();
checkConfig();
</script>
</body>
</html>
