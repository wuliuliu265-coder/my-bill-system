<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>云端记账系统 - 移动优化版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f5f7fb;
  --card: rgba(255,255,255,0.92);
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --danger: #ef4444;
  --danger-soft: #fef2f2;
  --success: #16a34a;
  --success-soft: #f0fdf4;
  --warn: #f59e0b;
  --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
  --radius: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; padding:0; font-family:"Segoe UI","PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:16px; }

/* 顶部导航自适应 */
.topbar { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; flex-wrap:nowrap; }
.brand h1 { margin:0; font-size:20px; font-weight:800; }
.brand p { display:none; } /* 手机端隐藏副标题节省空间 */

.month-switch { background:var(--card); border-radius:12px; padding:6px; display:flex; align-items:center; gap:5px; box-shadow:var(--shadow); }
.month-switch button { border:none; background:var(--primary-soft); color:var(--primary); width:30px; height:30px; border-radius:8px; cursor:pointer; font-weight:700; }
.month-switch span { min-width:80px; text-align:center; font-size:13px; font-weight:700; }

/* 汇总卡片自适应：手机端 2x2 布局 */
.summary-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-bottom:16px; }
.summary-card { background:var(--card); border-radius:16px; padding:12px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,0.5); }
.summary-card .label { color:var(--muted); font-size:11px; margin-bottom:4px; }
.summary-card .value { font-size:18px; font-weight:800; overflow:hidden; text-overflow:ellipsis; }

/* 核心布局重构：手机端单列，PC端三列 */
.layout { display: flex; flex-direction: column; gap: 16px; }
@media (min-width: 1024px) {
  .layout { display:grid; grid-template-columns: 280px minmax(0,1fr) 320px; }
}

.panel { background:var(--card); border:1px solid rgba(255,255,255,0.7); box-shadow:var(--shadow); border-radius:var(--radius); padding:16px; }
.panel h3 { margin:0 0 12px; font-size:16px; }

/* 日历适配 */
.calendar-box { display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; }
.day { padding:8px 0; font-size:12px; border-radius:8px; }

/* 表单适配 */
.form-grid { display:grid; grid-template-columns: 1fr; gap:12px; }
.category-buttons { display:flex; flex-wrap:wrap; gap:6px; }
.category-btn { padding:8px 12px; border-radius:10px; font-size:13px; border:1px solid var(--line); background:#fff; }
.category-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

.field input, .field select { padding:10px; border-radius:10px; border:1px solid var(--line); font-size:14px; width:100%; }

/* 流水列表适配 */
.record { padding:12px; border-radius:12px; margin-bottom:10px; }
.record-title { font-size:14px; font-weight:600; }
.record-meta { font-size:11px; }

/* 预算列表适配 */
.budget-item { padding:12px; border-radius:12px; }
.budget-input { width:70px; padding:4px; }

/* 图表适配 */
.charts { display: flex; flex-direction: column; gap: 16px; margin-top: 16px; }
@media (min-width: 768px) { .charts { display:grid; grid-template-columns: 1fr 1fr; } }
.chart-wrap { height:260px; position:relative; }

/* 移动端特定隐藏 */
@media (max-width: 768px) {
  .brand p { display: none; }
  .summary-grid { gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand">
      <h1>云端记账</h1>
      <p id="syncStatus">☁️ 初始化...</p>
    </div>
    <div class="month-switch">
      <button id="prevMonth">‹</button>
      <span id="currentMonthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card"><div class="label">本月结余</div><div class="value" id="balanceValue">¥0.00</div></div>
    <div class="summary-card"><div class="label">支出使用率</div><div class="value" id="budgetRateValue" style="color:var(--primary)">0%</div></div>
    <div class="summary-card income"><div class="label">总收入</div><div class="value" id="incomeValue" style="color:var(--success)">¥0.00</div></div>
    <div class="summary-card expense"><div class="label">总支出</div><div class="value" id="expenseValue" style="color:var(--danger)">¥0.00</div></div>
  </div>

  <div class="layout">
    <aside class="panel">
      <h3>日期筛选</h3>
      <div id="calendar" class="calendar-box"></div>
      <div style="margin-top:12px; font-size:13px;"><label><input type="checkbox" id="dayFilterToggle"/> 仅看选中日期</label></div>
      <div class="filter-tags" id="filterTags" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
    </aside>

    <main>
      <section class="panel" style="margin-bottom:16px;" id="formPanel">
        <h3 id="formTitle">快速记账</h3>
        <div class="form-grid">
          <div class="field"><input id="amountInput" type="number" step="0.01" placeholder="输入金额 ¥0.00"/></div>
          <div class="field">
            <div class="category-buttons" id="categoryButtons"></div>
          </div>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="field"><select id="typeInput"><option value="expense">支出</option><option value="income">收入</option></select></div>
            <div class="field"><input id="dateInput" type="date"/></div>
          </div>
          <div class="field"><input id="noteInput" type="text" placeholder="备注（选填）"/></div>
        </div>
        <div style="margin-top:12px; display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
          <button class="btn-primary" id="saveBtn" style="background:var(--primary); color:#fff; border:none; padding:12px; border-radius:12px; font-weight:700;">保存记录</button>
          <button id="resetBtn" style="border:1px solid var(--line); border-radius:12px; background:none;">重置</button>
        </div>
      </section>

      <section class="panel">
        <h3>历史流水</h3>
        <div id="recordList"></div>
      </section>
    </main>

    <aside class="panel">
      <h3>分类预算</h3>
      <div id="budgetList"></div>
      <div id="addCategoryBtn" style="text-align:center; padding:10px; border:2px dashed var(--primary-soft); border-radius:12px; color:var(--primary); cursor:pointer; font-size:14px; margin-top:10px;">+ 添加分类</div>
    </aside>
  </div>

  <div class="charts">
    <div class="panel"><h3>支出结构</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>
    <div class="panel"><h3>每日趋势</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
  </div>
</div>

<script>
// 使用你原本的配置
const CLOUD = {
    KEY: '$2a$10$UBAjkWUwdLMQCbr52Rx2BeQ8SousG.3M78OBWeXTzGFxRxIjWNpxS',
    BIN: '69b7b45aaa77b81da9eb53d7'
};

let records = [], budgets = {}, categories = ['餐饮', '交通', '购物', '娱乐', '住房', '工资'];
let selectedFormCategory = '餐饮', selectedCategory = '全部', selectedDay = null, currentDate = new Date();
let editingId = null, showOnlyDay = false, pieChart = null, barChart = null;

async function sync(isUpload = false) {
    const status = document.getElementById('syncStatus');
    status.textContent = isUpload ? "⏳ 同步中" : "☁️ 连接中";
    try {
        const url = `https://api.jsonbin.io/v3/b/${CLOUD.BIN}`;
        if (isUpload) {
            await fetch(url, { method: 'PUT', headers: { 'X-Master-Key': CLOUD.KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ records, budgets, categories }) });
            status.textContent = "✅ 已云同步";
        } else {
            const res = await fetch(url + '/latest', { headers: { 'X-Master-Key': CLOUD.KEY } });
            const d = await res.json();
            if (d.record) {
                records = d.record.records || [];
                budgets = d.record.budgets || {};
                categories = d.record.categories || categories;
                status.textContent = "✅ 连接成功";
            }
        }
    } catch (e) { status.textContent = "⚠️ 离线模式"; }
    renderAll();
}

function renderAll() {
    document.getElementById('currentMonthLabel').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;
    renderSummary();
    renderCategoryButtons();
    renderFilterTags();
    renderCalendar();
    renderRecords();
    renderBudgets();
    renderCharts();
}

function renderSummary() {
    const m = records.filter(r => r.date.startsWith(currentDate.toISOString().slice(0, 7)));
    const inc = m.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp = m.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const totalB = Object.values(budgets).reduce((a,b)=>a+b,0);
    document.getElementById('incomeValue').textContent = '¥'+inc.toFixed(1);
    document.getElementById('expenseValue').textContent = '¥'+exp.toFixed(1);
    document.getElementById('balanceValue').textContent = '¥'+(inc-exp).toFixed(1);
    document.getElementById('budgetRateValue').textContent = totalB ? Math.round(exp/totalB*100)+'%' : '0%';
}

function renderCategoryButtons() {
    const c = document.getElementById('categoryButtons'); c.innerHTML = '';
    categories.forEach(cat => {
        const b = document.createElement('button'); b.className = 'category-btn' + (selectedFormCategory===cat?' active':'');
        b.textContent = cat; b.onclick = () => { selectedFormCategory = cat; renderCategoryButtons(); };
        c.appendChild(b);
    });
}

function renderFilterTags() {
    const c = document.getElementById('filterTags'); c.innerHTML = '';
    ['全部', ...categories].forEach(tag => {
        const b = document.createElement('button'); 
        b.style = `padding:5px 10px; border-radius:20px; border:1px solid var(--line); font-size:12px; cursor:pointer; background:${selectedCategory===tag?'var(--primary-soft)':'#fff'}; color:${selectedCategory===tag?'var(--primary)':'#666'}`;
        b.textContent = tag; b.onclick = () => { selectedCategory = tag; renderAll(); };
        c.appendChild(b);
    });
}

function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
    const c = document.getElementById('calendar'); c.innerHTML = '';
    ['日','一','二','三','四','五','六'].forEach(w => { c.innerHTML += `<div style="text-align:center; font-size:11px; color:var(--muted); font-weight:700;">${w}</div>`; });
    for(let i=0; i<first; i++) c.innerHTML += `<div></div>`;
    for(let d=1; d<=last; d++){
        const f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const e = document.createElement('div');
        e.className = 'day';
        e.style = `text-align:center; cursor:pointer; background:${selectedDay===f?'var(--primary)':'#fff'}; color:${selectedDay===f?'#fff':'#333'}; border:1px solid ${selectedDay===f?'var(--primary)':'var(--line)'}`;
        e.textContent = d; e.onclick = () => { selectedDay = (selectedDay===f?null:f); renderAll(); };
        c.appendChild(e);
    }
}

function renderRecords() {
    const c = document.getElementById('recordList');
    const m = currentDate.toISOString().slice(0, 7);
    let l = records.filter(r => r.date.startsWith(m));
    if (selectedCategory!=='全部') l = l.filter(r => r.category === selectedCategory);
    if (showOnlyDay && selectedDay) l = l.filter(r => r.date === selectedDay);
    l.sort((a,b) => new Date(b.date)-new Date(a.date));
    c.innerHTML = l.length ? '' : '<div style="text-align:center; color:var(--muted); font-size:13px; padding:20px;">无记录</div>';
    l.forEach(r => {
        const i = document.createElement('div'); i.className = 'record';
        i.style = "background:#fff; border:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding:12px; border-radius:12px;";
        i.onclick = () => editRecord(r);
        i.innerHTML = `
            <div>
                <div class="record-title"><span style="background:var(--primary-soft); color:var(--primary); padding:2px 6px; border-radius:4px; font-size:10px; margin-right:5px;">${r.category}</span>${r.note || ''}</div>
                <div class="record-meta" style="color:var(--muted); margin-top:4px;">${r.date}</div>
            </div>
            <div style="text-align:right">
                <div style="font-weight:800; color:${r.type==='income'?'var(--success)':'var(--danger)'}">${r.type==='income'?'+':'-'}¥${r.amount.toFixed(1)}</div>
                <div style="font-size:16px; margin-top:5px;" onclick="event.stopPropagation(); deleteRecord(${r.id})">🗑</div>
            </div>`;
        c.appendChild(i);
    });
}

function renderBudgets() {
    const container = document.getElementById('budgetList'); container.innerHTML = '';
    categories.forEach(cat => {
        const spent = records.filter(r => r.category === cat && r.type === 'expense' && r.date.startsWith(currentDate.toISOString().slice(0, 7))).reduce((s,r)=>s+r.amount,0);
        const limit = budgets[cat] || 0;
        const item = document.createElement('div');
        item.style = "background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;";
        item.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-weight:700; font-size:14px;"><span onclick="deleteCategory('${cat}')" style="color:var(--danger); margin-right:8px;">×</span>${cat}</span>
                <input class="budget-input" type="number" value="${limit}" onchange="updateBudget('${cat}', this.value)" style="border:1px solid var(--line); border-radius:6px; text-align:right;">
            </div>
            <div style="font-size:11px; color:var(--muted); margin-bottom:5px;">已用 ¥${spent.toFixed(1)}</div>
            <div style="height:6px; background:#eee; border-radius:3px; overflow:hidden;"><div style="height:100%; background:var(--primary); width:${limit?Math.min(spent/limit*100, 100):0}%"></div></div>`;
        container.appendChild(item);
    });
}

function renderCharts() {
    const ctxP = document.getElementById('pieChart').getContext('2d'), ctxB = document.getElementById('barChart').getContext('2d');
    const mExp = records.filter(r => r.date.startsWith(currentDate.toISOString().slice(0, 7)) && r.type === 'expense');
    const pD = categories.map(c => mExp.filter(r=>r.category===c).reduce((s,r)=>s+r.amount,0));
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(ctxP, { type:'doughnut', data:{ labels:categories, datasets:[{data:pD, backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899']}] }, options: { maintainAspectRatio: false }});
    const days = new Array(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate()).fill(0).map((_,i)=>i+1);
    const bD = days.map(d => mExp.filter(r => new Date(r.date).getDate() === d).reduce((s,r)=>s+r.amount,0));
    if(barChart) barChart.destroy();
    barChart = new Chart(ctxB, { type:'bar', data:{ labels:days, datasets:[{label:'支出', data:bD, backgroundColor:'#4f46e5'}] }, options: { maintainAspectRatio: false }});
}

// 基础交互函数
function deleteCategory(cat) { if (categories.length > 1 && confirm(`确定删除分类 ${cat}？`)) { categories = categories.filter(c => c !== cat); delete budgets[cat]; sync(true); } }
function updateBudget(cat, v) { budgets[cat] = parseFloat(v)||0; sync(true); }
function editRecord(r) { editingId = r.id; document.getElementById('amountInput').value = r.amount; document.getElementById('typeInput').value = r.type; document.getElementById('dateInput').value = r.date; document.getElementById('noteInput').value = r.note; selectedFormCategory = r.category; document.getElementById('formTitle').textContent = "修改记录"; renderCategoryButtons(); window.scrollTo(0,0); }
function deleteRecord(id) { if(confirm('删除此条记录？')) { records = records.filter(r => r.id !== id); sync(true); } }

document.getElementById('saveBtn').onclick = () => {
    const a = parseFloat(document.getElementById('amountInput').value); if(!a) return alert('请输入金额');
    const nr = { id: editingId||Date.now(), amount:a, type:document.getElementById('typeInput').value, category:selectedFormCategory, date:document.getElementById('dateInput').value||new Date().toISOString().slice(0,10), note:document.getElementById('noteInput').value };
    if(editingId) { records = records.map(r => r.id === editingId ? nr : r); editingId = null; document.getElementById('formTitle').textContent="快速记账"; }
    else records.push(nr);
    document.getElementById('amountInput').value = ''; document.getElementById('noteInput').value = ''; sync(true);
};
document.getElementById('addCategoryBtn').onclick = () => { const n = prompt('新分类名称：'); if(n && !categories.includes(n)) { categories.push(n); budgets[n]=0; sync(true); } };
document.getElementById('resetBtn').onclick = () => { editingId=null; document.getElementById('amountInput').value=''; document.getElementById('noteInput').value=''; renderAll(); };
document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderAll(); };
document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderAll(); };
document.getElementById('dayFilterToggle').onchange = (e) => { showOnlyDay = e.target.checked; renderAll(); };
document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
sync();
</script>
</body>
</html>
