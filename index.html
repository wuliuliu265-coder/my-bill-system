<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人云记账系统 - 布局优化版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* 严格遵循原始视觉规范 */
:root {
  --bg: #f5f7fb;
  --card: rgba(255,255,255,0.92);
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --danger: #ef4444;
  --danger-soft: #fef2f2;
  --success: #16a34a;
  --success-soft: #f0fdf4;
  --warn: #f59e0b;
  --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
  --radius: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; padding:0; font-family:"Segoe UI","PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container{max-width:1400px;margin:0 auto;padding:24px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.brand h1{margin:0;font-size:28px;font-weight:800;letter-spacing:0.5px;}

.config-area { display: flex; gap: 10px; align-items: center; }
.text-btn { font-size: 13px; color: var(--primary); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }

.month-switch{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:16px;padding:10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);}
.month-switch button{border:none;background:var(--primary-soft);color:var(--primary);width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:18px;font-weight:700;}
.month-switch span{min-width:120px;text-align:center;font-weight:700;}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);}
.summary-card .label{color:var(--muted);font-size:13px;margin-bottom:10px;}
.summary-card .value{font-size:30px;font-weight:800;}
.summary-card.income .value{color:var(--success);}
.summary-card.expense .value{color:var(--danger);}

.layout{display:grid;grid-template-columns:280px minmax(0,1fr) 320px;gap:20px;align-items:start;}
.panel{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);overflow:hidden;}
.panel h3{margin:0 0 16px;font-size:18px;}

@media (max-width: 1024px) {
    .layout { display: flex; flex-direction: column; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
}

.calendar-box{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:14px;}
.weekday,.day{text-align:center;padding:10px 0;border-radius:12px;font-size:13px;position:relative;}
.weekday{color:var(--muted);font-weight:700;}
.day{background:#fff;border:1px solid var(--line);cursor:pointer;transition:0.2s ease;min-height:45px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.day.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 8px 16px rgba(79,70,229,0.25);}
.day.today{border:2px solid var(--primary);font-weight:800;color:var(--primary);}
.day.today.active{color:#fff;}
.day.empty{background:transparent;border:none;cursor:default;}
.dot { width:4px; height:4px; background:var(--primary); border-radius:50%; position:absolute; bottom:6px; }
.day.active .dot { background:#fff; }

.filter-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.tag{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;}
.tag.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.full{grid-column:1 / -1;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;}
.field input,.field select{width:100%;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:14px;font-size:14px;outline:none;}
.category-buttons{display:flex;flex-wrap:wrap;gap:10px;}
.category-btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:14px;cursor:pointer;font-size:14px;}
.category-btn.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:12px 18px;cursor:pointer;font-weight:700;}
.record{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:12px;cursor:pointer;}
.budget-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;}
.total-budget-card{background:var(--primary-soft);border:1px solid #c7d2fe;border-radius:16px;padding:16px;margin-bottom:16px;}

/* 支付汇总卡片样式 */
.account-summary-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:20px; }
.acc-row { display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; }
.acc-name { color: var(--muted); }
.acc-amount { font-weight: 700; }

.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px;}
.chart-wrap{height:300px;width:100%;position:relative;}

/* 支付方式小标签样式 */
.acc-tag { background:var(--line); color:var(--muted); padding:2px 6px; border-radius:4px; font-size:11px; margin-left:4px; }

/* === 核心优化：固定高度滚动区域 === */
#recordList, #budgetList {
    max-height: 450px; /* 固定高度，约容纳 5-6 个项目 */
    overflow-y: auto;  /* 开启垂直滚动 */
    padding-right: 6px; 
}
/* 自定义滚动条样式 */
#recordList::-webkit-scrollbar, #budgetList::-webkit-scrollbar { width: 4px; }
#recordList::-webkit-scrollbar-thumb, #budgetList::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
#recordList::-webkit-scrollbar-track, #budgetList::-webkit-scrollbar-track { background: transparent; }

</style>
</head>
<body>

<div class="container" id="appBody" style="display:none;">
  <div class="topbar">
    <div class="brand">
      <h1>云端记账系统</h1>
      <div class="config-area">
        <span id="syncStatus" style="font-size:13px; color:var(--muted);">☁️ 初始化...</span>
        <button class="text-btn" onclick="reconfig()">修改云端配置</button>
      </div>
    </div>
    <div class="month-switch">
      <button id="prevMonth">‹</button>
      <span id="currentMonthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card balance"><div class="label">本月结余</div><div class="value" id="balanceValue">¥0.00</div></div>
    <div class="summary-card income"><div class="label">本月收入</div><div class="value" id="incomeValue">¥0.00</div></div>
    <div class="summary-card expense"><div class="label">本月支出</div><div class="value" id="expenseValue">¥0.00</div></div>
    <div class="summary-card rate"><div class="label">预算使用率</div><div class="value" id="budgetRateValue">0%</div></div>
  </div>

  <div class="layout">
    <aside class="panel">
      <h3>日期与筛选</h3>
      <div id="calendar" class="calendar-box"></div>
      <div style="margin-top:15px; font-size:13px; color:var(--muted);">💡 点击日期可同步下方记账时间</div>
      <div class="filter-tags" id="filterTags"></div>
    </aside>

    <main>
      <section class="panel" style="margin-bottom:20px;" id="formPanel">
        <h3 id="formTitle">快速记账</h3>
        <div class="form-grid">
          <div class="field"><label>金额</label><input id="amountInput" type="number" step="0.01" placeholder="0.00"/></div>
          <div class="field"><label>类型</label><select id="typeInput"><option value="expense">支出</option><option value="income">收入</option></select></div>
          <div class="field full"><label>分类</label><div class="category-buttons" id="categoryButtons"></div></div>
          <div class="field"><label>支付方式</label>
            <select id="accountInput">
              <option value="微信支付">微信支付</option>
              <option value="支付宝">支付宝</option>
              <option value="银行卡">银行卡</option>
              <option value="现金">现金</option>
            </select>
          </div>
          <div class="field"><label>日期</label><input id="dateInput" type="date"/></div>
          <div class="field full"><label>备注</label><input id="noteInput" type="text" placeholder="备注信息..."/></div>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px;">
          <button class="btn-primary" id="saveBtn">保存并同步</button>
          <button style="background:none; border:1px solid var(--line); border-radius:14px; padding:12px 18px;" id="resetBtn">重置</button>
        </div>
      </section>

      <section class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h3 style="margin:0;">流水记录 </h3>
          <button class="text-btn" onclick="exportToCSV()">导出数据(CSV)</button>
        </div>
        <div id="recordList"></div>
      </section>
    </main>

    <aside class="panel">
      <h3>账户汇总 (本月)</h3>
      <div class="account-summary-card" id="accountSummaryBox"></div>

      <h3>分类预算 </h3>
      <div class="total-budget-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <span style="font-weight:800; color:var(--primary);">本月总预算</span>
          <input id="totalMonthlyBudget" style="width:100px; border:1px solid #c7d2fe; border-radius:8px; text-align:right; font-weight:800;" type="number" placeholder="总额" onchange="updateTotalBudget(this.value)">
        </div>
        <div id="remainingAllocInfo" style="font-size:11px; color:var(--muted);">剩余可分配：¥0.00</div>
      </div>
      
      <div id="budgetList"></div>
      
      <div style="margin-top:10px; color:var(--primary); cursor:pointer; font-weight:700; padding:10px; text-align:center; border:2px dashed var(--primary-soft); border-radius:14px;" id="addCategoryBtn">+ 添加新分类</div>
    </aside>
  </div>

  <div class="charts">
    <div class="panel"><h3>支出分布</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>
    <div class="panel"><h3>每日趋势</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
  </div>
</div>

<script>
let CLOUD = { KEY: localStorage.getItem('MY_BILL_KEY'), BIN: localStorage.getItem('MY_BILL_BIN') };
let records = [], budgets = {}, categories = ['餐饮', '交通', '购物', '娱乐', '住房', '医疗', '工资', '红包', '其他'];
let totalMonthlyBudget = 0;
let selectedFormCategory = '餐饮', selectedCategory = '全部', selectedDay = null;
let currentDate = new Date();
let editingId = null, pieChart = null, barChart = null;

const todayStr = new Date().toISOString().slice(0, 10);

function checkConfig() {
    if (!CLOUD.KEY || !CLOUD.BIN) {
        const key = prompt("请输入您的 JSONBin X-Master-Key:");
        const bin = prompt("请输入您的 Bin ID:");
        if (key && bin) {
            localStorage.setItem('MY_BILL_KEY', key); localStorage.setItem('MY_BILL_BIN', bin);
            CLOUD.KEY = key; CLOUD.BIN = bin; location.reload();
        }
    } else { document.getElementById('appBody').style.display = 'block'; sync(); }
}

function reconfig() { if(confirm("确定修改云端配置吗？")) { localStorage.removeItem('MY_BILL_KEY'); localStorage.removeItem('MY_BILL_BIN'); location.reload(); } }

async function sync(isUpload = false) {
    const status = document.getElementById('syncStatus');
    status.textContent = isUpload ? "⏳ 同步中..." : "☁️ 获取中...";
    try {
        const url = `https://api.jsonbin.io/v3/b/${CLOUD.BIN}`;
        const headers = { 'X-Master-Key': CLOUD.KEY, 'Content-Type': 'application/json' };
        if (isUpload) {
            await fetch(url, { method: 'PUT', headers: headers, body: JSON.stringify({ records, budgets, categories, totalMonthlyBudget }) });
            status.textContent = "✅ 已云同步";
        } else {
            const res = await fetch(url + '/latest', { headers: headers });
            const d = await res.json();
            if (d.record) {
                records = d.record.records || []; budgets = d.record.budgets || {}; 
                categories = d.record.categories || categories;
                totalMonthlyBudget = d.record.totalMonthlyBudget || 0;
                status.textContent = "✅ 连接成功";
            }
        }
    } catch (e) { status.textContent = "⚠️ 连接失败"; }
    renderAll();
}

function renderAll() {
    if (isNaN(currentDate.getTime())) currentDate = new Date();
    document.getElementById('currentMonthLabel').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;
    document.getElementById('totalMonthlyBudget').value = totalMonthlyBudget || '';
    renderSummary(); renderCategoryButtons(); renderFilterTags(); renderCalendar(); renderRecords(); renderBudgets(); renderCharts(); renderAccountSummary();
}

function renderSummary() {
    const mPrefix = currentDate.toISOString().slice(0, 7);
    const mRecords = records.filter(r => r.date.startsWith(mPrefix));
    const inc = mRecords.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp = mRecords.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const rate = totalMonthlyBudget ? Math.round(exp/totalMonthlyBudget*100) : 0;
    
    document.getElementById('incomeValue').textContent = '¥'+inc.toFixed(2);
    document.getElementById('expenseValue').textContent = '¥'+exp.toFixed(2);
    document.getElementById('balanceValue').textContent = '¥'+(inc-exp).toFixed(2);
    document.getElementById('budgetRateValue').textContent = rate + '%';
    document.getElementById('budgetRateValue').style.color = rate > 100 ? 'var(--danger)' : 'var(--text)';
}

function renderAccountSummary() {
    const mPrefix = currentDate.toISOString().slice(0, 7);
    const mRecords = records.filter(r => r.date.startsWith(mPrefix));
    const accounts = ["微信支付", "支付宝", "银行卡", "现金"];
    const box = document.getElementById('accountSummaryBox');
    box.innerHTML = '';
    accounts.forEach(acc => {
        const accRecords = mRecords.filter(r => (r.account || "微信支付") === acc);
        const inc = accRecords.filter(r => r.type === 'income').reduce((s,r) => s + r.amount, 0);
        const exp = accRecords.filter(r => r.type === 'expense').reduce((s,r) => s + r.amount, 0);
        const net = inc - exp;
        const row = document.createElement('div');
        row.className = 'acc-row';
        row.innerHTML = `<span class="acc-name">${acc}</span><span class="acc-amount" style="color: ${net >= 0 ? 'var(--success)' : 'var(--danger)'}">${net >= 0 ? '+' : ''}${net.toFixed(2)}</span>`;
        box.appendChild(row);
    });
}

function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
    const c = document.getElementById('calendar'); c.innerHTML = '';
    ['日','一','二','三','四','五','六'].forEach(w => { const d = document.createElement('div'); d.className='weekday'; d.textContent=w; c.appendChild(d); });
    for(let i=0; i<first; i++) c.appendChild(Object.assign(document.createElement('div'), {className:'day empty'}));
    for(let d=1; d<=last; d++){
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayEl = document.createElement('div');
        let classes = ['day'];
        if (dateStr === todayStr) classes.push('today');
        if (dateStr === selectedDay) classes.push('active');
        dayEl.className = classes.join(' ');
        dayEl.textContent = d;
        if (records.some(r => r.date === dateStr)) {
            const dot = document.createElement('div'); dot.className = 'dot'; dayEl.appendChild(dot);
        }
        dayEl.onclick = () => {
            if (selectedDay === dateStr) { selectedDay = null; } 
            else { selectedDay = dateStr; document.getElementById('dateInput').value = dateStr; }
            renderAll();
        };
        c.appendChild(dayEl);
    }
}

function renderRecords() {
    const c = document.getElementById('recordList');
    const mPrefix = currentDate.toISOString().slice(0, 7);
    let l = records.filter(r => r.date.startsWith(mPrefix));
    if (selectedCategory!=='全部') l = l.filter(r => r.category === selectedCategory);
    if (selectedDay) l = l.filter(r => r.date === selectedDay);
    l.sort((a,b) => new Date(b.date)-new Date(a.date));
    c.innerHTML = l.length ? '' : `<div style="text-align:center; color:var(--muted); padding:20px;">${selectedDay?'该日无记录':'本月无记录'}</div>`;
    l.forEach(r => {
        const i = document.createElement('div'); i.className = 'record';
        i.onclick = () => editRecord(r);
        i.innerHTML = `<div><span style="background:var(--primary-soft); color:var(--primary); padding:2px 6px; border-radius:4px; font-size:11px;">${r.category}</span><span class="acc-tag">${r.account || '微信支付'}</span><span style="margin-left:5px;">${r.note || ''}</span><div style="font-size:12px; color:var(--muted); margin-top:4px;">${r.date}</div></div><div style="text-align:right"><div style="font-weight:800; color:${r.type==='income'?'var(--success)':'var(--danger)'}">${r.type==='income'?'+':'-'}¥${r.amount.toFixed(2)}</div><button style="border:none; background:none; cursor:pointer;" onclick="event.stopPropagation(); deleteRecord(${r.id})">🗑</button></div>`;
        c.appendChild(i);
    });
}

function renderBudgets() {
    const container = document.getElementById('budgetList'); container.innerHTML = '';
    const mPrefix = currentDate.toISOString().slice(0, 7);
    let sumAllocated = 0;
    categories.forEach(cat => {
        const spent = records.filter(r => r.category === cat && r.type === 'expense' && r.date.startsWith(mPrefix)).reduce((s,r)=>s+r.amount,0);
        const limit = budgets[cat] || 0;
        sumAllocated += limit;
        const item = document.createElement('div'); item.className = 'budget-item';
        item.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><span style="font-weight:700;">${cat}</span><div style="display:flex; align-items:center; gap:8px;"><input style="width:70px; border:1px solid var(--line); border-radius:8px; text-align:right;" type="number" value="${limit}" onchange="updateBudget('${cat}', this.value)"><button style="border:none; background:none; cursor:pointer; font-size:12px; opacity:0.5;" onclick="deleteCategory('${cat}')">🗑</button></div></div><div style="font-size:12px; color:var(--muted); margin-bottom:5px;">已用 ¥${spent.toFixed(2)} / 预算 ¥${limit.toFixed(2)}</div><div style="height:6px; background:#eee; border-radius:3px; overflow:hidden;"><div style="height:100%; background:${spent>limit?'var(--danger)':'var(--primary)'}; width:${limit?Math.min(spent/limit*100, 100):0}%"></div></div>`;
        container.appendChild(item);
    });
    const remaining = totalMonthlyBudget - sumAllocated;
    const infoBox = document.getElementById('remainingAllocInfo');
    if(remaining < 0) {
        infoBox.innerHTML = `⚠️ 分类预算超额：¥${Math.abs(remaining).toFixed(2)}`;
        infoBox.style.color = 'var(--danger)';
    } else {
        infoBox.innerHTML = `剩余可分配：¥${remaining.toFixed(2)}`;
        infoBox.style.color = 'var(--muted)';
    }
}

function renderCharts() {
    const ctxP = document.getElementById('pieChart').getContext('2d'), ctxB = document.getElementById('barChart').getContext('2d');
    const mPrefix = currentDate.toISOString().slice(0, 7);
    const mExp = records.filter(r => r.date.startsWith(mPrefix) && r.type === 'expense');
    const pD = categories.map(c => mExp.filter(r=>r.category===c).reduce((s,r)=>s+r.amount,0));
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(ctxP, { type:'doughnut', data:{ labels:categories, datasets:[{data:pD, backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#64748b']}] }, options: { maintainAspectRatio: false }});
    const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate();
    const days = new Array(daysInMonth).fill(0).map((_,i)=>i+1);
    const bD = days.map(d => mExp.filter(r => new Date(r.date).getDate() === d).reduce((s,r)=>s+r.amount,0));
    if(barChart) barChart.destroy();
    barChart = new Chart(ctxB, { type:'bar', data:{ labels:days, datasets:[{label:'支出', data:bD, backgroundColor:'#4f46e5'}] }, options: { maintainAspectRatio: false }});
}

function renderCategoryButtons() {
    const c = document.getElementById('categoryButtons'); c.innerHTML = '';
    categories.forEach(cat => {
        const b = document.createElement('button'); b.className = 'category-btn' + (selectedFormCategory===cat?' active':'');
        b.textContent = cat; b.onclick = () => { selectedFormCategory = cat; renderCategoryButtons(); };
        c.appendChild(b);
    });
}

function renderFilterTags() {
    const c = document.getElementById('filterTags'); c.innerHTML = '';
    ['全部', ...categories].forEach(tag => {
        const b = document.createElement('button'); b.className = 'tag' + (selectedCategory===tag?' active':'');
        b.textContent = tag; b.onclick = () => { selectedCategory = tag; renderAll(); };
        c.appendChild(b);
    });
}

function updateTotalBudget(v) { totalMonthlyBudget = parseFloat(v) || 0; sync(true); }
function updateBudget(cat, v) { budgets[cat] = parseFloat(v)||0; sync(true); }
function editRecord(r) { 
    editingId = r.id; 
    document.getElementById('amountInput').value = r.amount; 
    document.getElementById('typeInput').value = r.type; 
    document.getElementById('dateInput').value = r.date; 
    document.getElementById('noteInput').value = r.note; 
    document.getElementById('accountInput').value = r.account || '微信支付';
    selectedFormCategory = r.category; 
    document.getElementById('formTitle').textContent = "修改记录"; 
    renderCategoryButtons(); 
    window.scrollTo(0,0); 
}
function deleteRecord(id) { if(confirm('确定删除？')) { records = records.filter(r => r.id !== id); sync(true); } }
function deleteCategory(cat) { if(confirm(`确定删除“${cat}”分类吗？`)) { categories = categories.filter(c => c !== cat); delete budgets[cat]; if (selectedFormCategory === cat) selectedFormCategory = categories[0] || ''; sync(true); } }

document.getElementById('saveBtn').onclick = () => {
    const a = parseFloat(document.getElementById('amountInput').value); if(!a) return alert('请输入金额');
    const nr = { id: editingId||Date.now(), amount:a, type:document.getElementById('typeInput').value, category:selectedFormCategory, account:document.getElementById('accountInput').value, date:document.getElementById('dateInput').value||todayStr, note:document.getElementById('noteInput').value };
    if(editingId) { records = records.map(r => r.id === editingId ? nr : r); editingId = null; document.getElementById('formTitle').textContent="快速记账"; }
    else records.push(nr);
    document.getElementById('amountInput').value = ''; document.getElementById('noteInput').value = ''; sync(true);
};

document.getElementById('resetBtn').onclick = () => { editingId=null; selectedDay=null; document.getElementById('amountInput').value=''; document.getElementById('noteInput').value=''; document.getElementById('dateInput').value = todayStr; renderAll(); };
document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); selectedDay = null; renderAll(); };
document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); selectedDay = null; renderAll(); };
document.getElementById('addCategoryBtn').onclick = () => { const n = prompt('新分类名称：'); if(n && !categories.includes(n)) { categories.push(n); budgets[n]=0; sync(true); } };

function exportToCSV() {
    if (records.length === 0) return alert("暂无数据可导出");
    let csv = "\uFEFF日期,分类,支付方式,类型,金额,备注\n";
    records.forEach(r => { csv += `${r.date},${r.category},${r.account || '微信支付'},${r.type==='income'?'收入':'支出'},${r.amount},"${r.note||''}"\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `账本导出_${new Date().toISOString().slice(0,10)}.csv`; link.click();
}

document.getElementById('dateInput').value = todayStr;
checkConfig();
</script>
</body>
</html>
