<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>个人云记账系统 - 增强版</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* 严格遵循原始视觉规范 */
:root {
  --bg: #f5f7fb;
  --card: rgba(255,255,255,0.92);
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --primary: #4f46e5;
  --primary-soft: #eef2ff;
  --danger: #ef4444;
  --danger-soft: #fef2f2;
  --success: #16a34a;
  --success-soft: #f0fdf4;
  --warn: #f59e0b;
  --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
  --radius: 20px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; padding:0; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
.container{max-width:1400px;margin:0 auto;padding:24px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.brand h1{margin:0;font-size:28px;font-weight:800;letter-spacing:0.5px;}
.brand p{margin:4px 0 0;color:var(--muted);font-size:14px;}
.month-switch{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:16px;padding:10px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);}
.month-switch button{border:none;background:var(--primary-soft);color:var(--primary);width:36px;height:36px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;transition:0.2s;}
.month-switch button:hover{background:var(--primary);color:#fff;}
.month-switch span{min-width:120px;text-align:center;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);transition:0.3s;position:relative;overflow:hidden;}
.summary-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--primary);opacity:0.5;}
.summary-card.income::before{background:var(--success);}
.summary-card.expense::before{background:var(--danger);}
.summary-card .label{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.summary-card .value{font-size:30px;font-weight:800;letter-spacing:-0.5px;font-variant-numeric:tabular-nums;}
.layout{display:grid;grid-template-columns:280px minmax(0,1fr) 320px;gap:20px;align-items:start;}
.panel{background:var(--card);border:1px solid rgba(255,255,255,0.7);box-shadow:var(--shadow);border-radius:var(--radius);padding:20px;backdrop-filter:blur(10px);overflow:hidden;}
.panel h3{margin:0 0 16px;font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;}
.calendar-box{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:14px;}
.weekday,.day{text-align:center;padding:10px 0;border-radius:12px;font-size:13px;transition:0.2s;}
.weekday{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;}
.day{background:#fff;border:1px solid var(--line);cursor:pointer;font-weight:600;color:var(--text);}
.day:hover{border-color:var(--primary);color:var(--primary);}
.day.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 8px 16px rgba(79,70,229,0.25);}
.day.empty{background:transparent;border:none;cursor:default;}
.filter-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.tag{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;transition:0.2s;font-weight:600;}
.tag:hover{border-color:var(--primary);color:var(--primary);}
.tag.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.full{grid-column:1 / -1;}
.field label{display:block;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.field input,.field select{width:100%;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:14px;font-size:14px;transition:0.2s;outline:none;font-weight:500;}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft);}
.category-buttons{display:flex;flex-wrap:wrap;gap:10px;}
.category-btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:10px 14px;border-radius:14px;cursor:pointer;font-size:14px;transition:0.2s;font-weight:600;}
.category-btn:hover{border-color:var(--primary);background:var(--primary-soft);}
.category-btn.active{background:var(--primary-soft);color:var(--primary);border-color:#c7d2fe;font-weight:700;box-shadow:0 4px 10px rgba(79,70,229,0.1);}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:14px;padding:12px 18px;cursor:pointer;font-weight:700;font-size:15px;transition:0.3s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(79,70,229,0.3);}
.record{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:12px;transition:0.2s;cursor:pointer;}
.record:hover{transform:translateX(4px);border-color:var(--primary);box-shadow:var(--shadow);}
.record-title{font-weight:700;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.record-meta{font-size:12px;color:var(--muted);font-weight:500;}
.amount{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
.amount.expense{color:var(--danger);}
.amount.income{color:var(--success);}
.budget-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.budget-info{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;}
.progress-bg{height:8px;background:var(--bg);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg, var(--primary), #818cf8);transition:1s cubic-bezier(0.34, 1.56, 0.64, 1);}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px;}
.chart-wrap{height:300px;width:100%;position:relative;}

/* 新增：删除分类按钮样式 */
.delete-cat-btn {
    color: var(--danger);
    cursor: pointer;
    font-weight: bold;
    margin-right: 8px;
    font-size: 16px;
    border: none;
    background: none;
    padding: 0 4px;
    border-radius: 4px;
}
.delete-cat-btn:hover {
    background: var(--danger-soft);
}

@media (max-width:1100px){.layout{grid-template-columns:1fr;}.summary-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:600px){.summary-grid{grid-template-columns:1fr;}.charts{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand">
      <h1>云端记账系统</h1>
      <p id="syncStatus">☁️ 初始化中...</p>
    </div>
    <div class="month-switch">
      <button id="prevMonth">‹</button>
      <span id="currentMonthLabel"></span>
      <button id="nextMonth">›</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card balance">
      <div class="label">本月结余</div>
      <div class="value" id="balanceValue">¥0.00</div>
    </div>
    <div class="summary-card income">
      <div class="label">总收入</div>
      <div class="value" id="incomeValue">¥0.00</div>
    </div>
    <div class="summary-card expense">
      <div class="label">总支出</div>
      <div class="value" id="expenseValue">¥0.00</div>
    </div>
    <div class="summary-card rate">
      <div class="label">预算使用率</div>
      <div class="value" id="budgetRateValue">0%</div>
    </div>
  </div>

  <div class="layout">
    <aside class="panel">
      <h3>📅 日期筛选</h3>
      <div id="calendar" class="calendar-box"></div>
      <div style="margin-top:15px;">
        <label style="font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="dayFilterToggle" style="width:16px;height:16px;"> 仅显示选中日期的流水
        </label>
      </div>
      <div class="filter-tags" id="filterTags"></div>
    </aside>

    <main>
      <section class="panel" style="margin-bottom:20px;" id="formPanel">
        <h3 id="formTitle">✍️ 快速记账</h3>
        <div class="form-grid">
          <div class="field"><label>金额</label><input id="amountInput" type="number" step="0.01" placeholder="0.00"></div>
          <div class="field"><label>类型</label><select id="typeInput"><option value="expense">支出</option><option value="income">收入</option></select></div>
          <div class="field full"><label>选择分类</label><div class="category-buttons" id="categoryButtons"></div></div>
          <div class="field"><label>日期</label><input id="dateInput" type="date"></div>
          <div class="field"><label>备注</label><input id="noteInput" type="text" placeholder="去哪儿消费了？"></div>
        </div>
        <div style="margin-top:16px;display:flex;gap:12px;">
          <button class="btn-primary" id="saveBtn">保存记录并同步</button>
          <button style="background:none;border:1px solid var(--line);border-radius:14px;padding:12px 18px;cursor:pointer;font-weight:700;color:var(--muted);" id="resetBtn">重置</button>
        </div>
      </section>

      <section class="panel">
        <h3>📜 历史流水</h3>
        <div id="recordList"></div>
      </section>
    </main>

    <aside class="panel">
      <h3>📊 分类预算</h3>
      <div id="budgetList"></div>
      <div id="addCategoryBtn" style="margin-top:10px;text-align:center;padding:12px;border:2px dashed var(--primary-soft);border-radius:14px;color:var(--primary);cursor:pointer;font-weight:700;font-size:14px;transition:0.2s;">+ 添加自定义分类</div>
    </aside>
  </div>

  <div class="charts">
    <div class="panel"><h3>🍕 支出结构</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>
    <div class="panel"><h3>📈 每日趋势</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
  </div>
</div>

<script>
const CLOUD = {
    KEY: '$2a$10$UBAjkWUwdLMQCbr52Rx2BeQ8SousG.3M78OBWeXTzGFxRxIjWNpxS',
    BIN: '69b7b45aaa77b81da9eb53d7'
};

let records = [], budgets = {}, categories = ['餐饮', '交通', '购物', '娱乐', '住房', '医疗', '工资', '红包', '其他'];
let selectedFormCategory = '餐饮', selectedCategory = '全部', selectedDay = null, currentDate = new Date();
let editingId = null, showOnlyDay = false, pieChart = null, barChart = null;

async function sync(isUpload = false) {
    const status = document.getElementById('syncStatus');
    status.textContent = isUpload ? "⏳ 正在云同步..." : "☁️ 正在连接云端...";
    try {
        const url = `https://api.jsonbin.io/v3/b/${CLOUD.BIN}`;
        const headers = { 'X-Master-Key': CLOUD.KEY, 'Content-Type': 'application/json' };
        if (isUpload) {
            await fetch(url, { method: 'PUT', headers: headers, body: JSON.stringify({ records, budgets, categories }) });
            status.textContent = "✅ 数据已同步至云端";
        } else {
            const res = await fetch(url + '/latest', { headers: headers });
            const d = await res.json();
            if (d.record) {
                records = d.record.records || [];
                budgets = d.record.budgets || {};
                categories = d.record.categories || categories;
                status.textContent = "✅ 云端连接成功";
            }
        }
    } catch (e) { status.textContent = "⚠️ 离线模式：连接失败"; }
    renderAll();
}

function renderAll() {
    document.getElementById('currentMonthLabel').textContent = `${currentDate.getFullYear()}年${currentDate.getMonth()+1}月`;
    renderSummary(); renderCategoryButtons(); renderFilterTags(); renderCalendar(); renderRecords(); renderBudgets(); renderCharts();
}

function renderSummary() {
    const m = records.filter(r => r.date.startsWith(currentDate.toISOString().slice(0, 7)));
    const inc = m.filter(r => r.type==='income').reduce((s,r)=>s+r.amount,0);
    const exp = m.filter(r => r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const totalB = Object.values(budgets).reduce((a,b)=>a+b,0);
    document.getElementById('incomeValue').textContent = '¥'+inc.toFixed(2);
    document.getElementById('expenseValue').textContent = '¥'+exp.toFixed(2);
    document.getElementById('balanceValue').textContent = '¥'+(inc-exp).toFixed(2);
    document.getElementById('budgetRateValue').textContent = totalB ? Math.round(exp/totalB*100)+'%' : '0%';
}

function renderCategoryButtons() {
    const c = document.getElementById('categoryButtons'); c.innerHTML = '';
    categories.forEach(cat => {
        const b = document.createElement('button'); b.className = 'category-btn' + (selectedFormCategory===cat?' active':'');
        b.textContent = cat; b.onclick = () => { selectedFormCategory = cat; renderCategoryButtons(); };
        c.appendChild(b);
    });
}

function renderFilterTags() {
    const c = document.getElementById('filterTags'); c.innerHTML = '';
    ['全部', ...categories].forEach(tag => {
        const b = document.createElement('button'); b.className = 'tag' + (selectedCategory===tag?' active':'');
        b.textContent = tag; b.onclick = () => { selectedCategory = tag; renderAll(); };
        c.appendChild(b);
    });
}

function renderCalendar() {
    const y = currentDate.getFullYear(), m = currentDate.getMonth();
    const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
    const c = document.getElementById('calendar'); c.innerHTML = '';
    ['日','一','二','三','四','五','六'].forEach(w => { const d = document.createElement('div'); d.className='weekday'; d.textContent=w; c.appendChild(d); });
    for(let i=0; i<first; i++) c.appendChild(Object.assign(document.createElement('div'), {className:'day empty'}));
    for(let d=1; d<=last; d++){
        const f = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const e = document.createElement('div'); e.className = 'day' + (selectedDay===f?' active':'');
        e.textContent = d; e.onclick = () => { selectedDay = (selectedDay===f?null:f); renderAll(); };
        c.appendChild(e);
    }
}

function renderRecords() {
    const c = document.getElementById('recordList');
    const m = currentDate.toISOString().slice(0, 7);
    let l = records.filter(r => r.date.startsWith(m));
    if (selectedCategory!=='全部') l = l.filter(r => r.category === selectedCategory);
    if (showOnlyDay && selectedDay) l = l.filter(r => r.date === selectedDay);
    l.sort((a,b) => new Date(b.date)-new Date(a.date));
    c.innerHTML = l.length ? '' : '<div style="text-align:center; color:var(--muted); padding:20px; font-weight:600;">本月暂无记账记录</div>';
    l.forEach(r => {
        const i = document.createElement('div'); i.className = 'record';
        i.onclick = () => editRecord(r);
        i.innerHTML = `<div><div class="record-title"><span style="background:var(--primary-soft);color:var(--primary);padding:2px 8px;border-radius:6px;font-size:11px;">${r.category}</span>${r.note || '无备注'}</div><div class="record-meta">${r.date}</div></div><div style="text-align:right"><div class="amount ${r.type}">${r.type==='income'?'+':'-'}¥${r.amount.toFixed(2)}</div><div style="font-size:16px;margin-top:4px;" onclick="event.stopPropagation(); deleteRecord(${r.id})">🗑️</div></div>`;
        c.appendChild(i);
    });
}

// 修改：增加了删除分类的逻辑
function renderBudgets() {
    const container = document.getElementById('budgetList'); container.innerHTML = '';
    categories.forEach(cat => {
        const spent = records.filter(r => r.category === cat && r.type === 'expense' && r.date.startsWith(currentDate.toISOString().slice(0, 7))).reduce((s,r)=>s+r.amount,0);
        const limit = budgets[cat] || 0;
        const item = document.createElement('div'); item.className = 'budget-item';
        item.innerHTML = `
            <div class="budget-header">
                <span style="font-weight:700;font-size:14px;display:flex;align-items:center;">
                    <button class="delete-cat-btn" onclick="deleteCategory('${cat}')">×</button>${cat}
                </span>
                <input style="width:70px;border:1px solid var(--line);border-radius:8px;text-align:right;padding:4px 8px;font-weight:700;color:var(--primary);" type="number" value="${limit}" onchange="updateBudget('${cat}', this.value)">
            </div>
            <div class="budget-info"><span>已支出 ¥${spent.toFixed(2)}</span><span>预算 ¥${limit}</span></div>
            <div class="progress-bg"><div class="progress-fill" style="width:${limit?Math.min(spent/limit*100, 100):0}%;background:${spent>limit?'var(--danger)':'var(--primary)'}"></div></div>`;
        container.appendChild(item);
    });
}

function renderCharts() {
    const ctxP = document.getElementById('pieChart').getContext('2d'), ctxB = document.getElementById('barChart').getContext('2d');
    const mExp = records.filter(r => r.date.startsWith(currentDate.toISOString().slice(0, 7)) && r.type === 'expense');
    const pD = categories.map(c => mExp.filter(r=>r.category===c).reduce((s,r)=>s+r.amount,0));
    if(pieChart) pieChart.destroy();
    pieChart = new Chart(ctxP, { type:'doughnut', data:{ labels:categories, datasets:[{data:pD, backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#64748b'],borderWidth:0,hoverOffset:10}] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 15, font: { weight: '600', size: 11 } } } }, cutout: '70%' }});
    const days = new Array(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0).getDate()).fill(0).map((_,i)=>i+1);
    const bD = days.map(d => mExp.filter(r => new Date(r.date).getDate() === d).reduce((s,r)=>s+r.amount,0));
    if(barChart) barChart.destroy();
    barChart = new Chart(ctxB, { type:'bar', data:{ labels:days, datasets:[{label:'每日支出', data:bD, backgroundColor:'#4f46e5', borderRadius:5}] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f3f4f6' } }, x: { grid: { display: false } } } }});
}

// 新增：删除分类的逻辑
function deleteCategory(cat) {
    if (categories.length <= 1) {
        alert("至少需要保留一个分类");
        return;
    }
    if (confirm(`确定要删除分类“${cat}”吗？该操作仅删除分类标签及预算配置。`)) {
        categories = categories.filter(c => c !== cat);
        delete budgets[cat];
        // 如果当前选中的分类被删了，自动选第一个
        if (selectedFormCategory === cat) selectedFormCategory = categories[0];
        sync(true);
    }
}

function updateBudget(cat, v) { budgets[cat] = parseFloat(v)||0; sync(true); }

function editRecord(r) {
    editingId = r.id;
    document.getElementById('amountInput').value = r.amount;
    document.getElementById('typeInput').value = r.type;
    document.getElementById('dateInput').value = r.date;
    document.getElementById('noteInput').value = r.note;
    selectedFormCategory = r.category;
    document.getElementById('formTitle').textContent = "📝 修改记录";
    document.getElementById('formPanel').style.background = "var(--primary-soft)";
    renderCategoryButtons();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function deleteRecord(id) { if(confirm('确定删除此条记录？')) { records = records.filter(r => r.id !== id); sync(true); } }

document.getElementById('saveBtn').onclick = () => {
    const a = parseFloat(document.getElementById('amountInput').value); if(!a) return alert('请输入金额');
    const nr = { id: editingId||Date.now(), amount:a, type:document.getElementById('typeInput').value, category:selectedFormCategory, date:document.getElementById('dateInput').value||new Date().toISOString().slice(0,10), note:document.getElementById('noteInput').value };
    if(editingId) { records = records.map(r => r.id === editingId ? nr : r); editingId = null; document.getElementById('formTitle').textContent="✍️ 快速记账"; document.getElementById('formPanel').style.background="var(--card)"; }
    else records.push(nr);
    document.getElementById('amountInput').value = ''; document.getElementById('noteInput').value = ''; sync(true);
};

document.getElementById('addCategoryBtn').onclick = () => {
    const n = prompt('新分类名称：'); if(n && !categories.includes(n)) { categories.push(n); budgets[n]=0; sync(true); }
};

document.getElementById('resetBtn').onclick = () => { editingId=null; document.getElementById('formTitle').textContent="✍️ 快速记账"; document.getElementById('formPanel').style.background="var(--card)"; document.getElementById('amountInput').value=''; document.getElementById('noteInput').value=''; renderAll(); };
document.getElementById('prevMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderAll(); };
document.getElementById('nextMonth').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderAll(); };
document.getElementById('dayFilterToggle').onchange = (e) => { showOnlyDay = e.target.checked; renderAll(); };
document.getElementById('dateInput').value = new Date().toISOString().slice(0,10);
sync();
</script>
</body>
</html>
